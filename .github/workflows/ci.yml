# ============================================================
# CI/CD Pipeline - GitHub Actions
# ============================================================
# 这个文件告诉 GitHub：每次 push 代码时，自动运行测试
#
# 什么是 CI/CD？
# CI (Continuous Integration) = 持续集成 = 每次改代码自动测试
# CD (Continuous Deployment) = 持续部署 = 测试通过自动上线
#
# 本文件实现了 CI 部分：自动测试
# ============================================================

name: CI - Run Tests  # 这个 workflow 的名字（显示在 GitHub 上）

# ===== 什么时候触发？=====
on:
  push:           # 每次 push 代码时触发
    branches:
      - master    # 只在 master 分支上触发
  pull_request:   # 每次提 PR 时也触发
    branches:
      - master

# ===== 要做什么？=====
jobs:
  test:  # job 的名字
    name: Run Tests  # 显示在 GitHub 上的名字
    runs-on: ubuntu-latest  # 在 Ubuntu 服务器上运行（GitHub 免费提供）

    # ----- 步骤 -----
    steps:
      # Step 1：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4
        # 这一步把你的代码从 GitHub 下载到测试服务器上

      # Step 2：安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        # 测试服务器是空的，需要安装 Python

      # Step 3：安装 Graphviz 系统软件
      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
        # Ubuntu 上用 apt-get 安装（不是 winget）

      # Step 4：安装 Python 依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
        # 安装 requirements.txt 里列的所有库

      # Step 5：运行测试！
      - name: Run tests
        run: python -m pytest test_engine.py -v
        # 运行所有测试，-v 表示显示详细信息
        # 如果任何测试失败，整个 CI 会标记为失败（红色 X）
        # 全部通过则标记为成功（绿色勾）
